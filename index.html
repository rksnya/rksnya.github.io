<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>施工中 ✦ rks.asia</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #faf3e6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Noto Sans SC', sans-serif;
        }

        .container {
            text-align: center;
            padding: 40px 20px;
            max-width: 700px;
        }

        .cat-emoji {
            font-size: 80px;
            display: block;
            animation: catSway 2s ease-in-out infinite;
            filter: drop-shadow(0 10px 30px rgba(255, 183, 77, 0.3));
        }

        @keyframes catSway {
            0%, 100% { transform: rotate(-5deg) translateY(0); }
            50% { transform: rotate(5deg) translateY(-10px); }
        }

        h1 {
            font-size: 32px;
            color: #5d4037;
            margin: 20px 0 10px;
            font-weight: 700;
        }

        .subtitle {
            font-size: 18px;
            color: #8d6e63;
            margin-bottom: 25px;
        }

        .subtitle span {
            background: #ffccbc;
            padding: 2px 12px;
            border-radius: 20px;
            color: #bf5b3a;
        }

        .progress-box {
            background: white;
            border-radius: 30px;
            padding: 30px 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.06);
            margin: 20px 0;
        }

        .progress-track {
            width: 100%;
            height: 16px;
            background: #f5ebe0;
            border-radius: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 42%;
            background: linear-gradient(90deg, #ffb74d, #ff8a65);
            border-radius: 20px;
            animation: fillPulse 2s ease-in-out infinite;
        }

        @keyframes fillPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #a1887f;
            margin-top: 10px;
        }

        .status-msg {
            margin-top: 20px;
            color: #795548;
            font-size: 15px;
            background: #f5ebe0;
            padding: 10px 20px;
            border-radius: 40px;
            display: inline-block;
        }

        .status-msg .cursor {
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .links {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .links a {
            color: #8d6e63;
            text-decoration: none;
            border-bottom: 2px dashed #d7ccc8;
            padding-bottom: 2px;
            font-size: 14px;
            transition: 0.2s;
        }

        .links a:hover {
            color: #bf5b3a;
            border-bottom-color: #bf5b3a;
        }

        .footer {
            margin-top: 35px;
            color: #bcaaa4;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="container">

        <h1>✦ 施工中 —— 摸鱼状态喵 ✦</h1>
        <p class="subtitle">
            <span>rks.asia</span> 正在摸鱼中 ...
        </p>

        <div class="footer">
            ✦ 预计完工时间: 等我睡醒喵 ✦
        </div>
    </div>

</body>
</html>
